name: Pull Request Discord Notification

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify:
    name: Send Webhook
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Embed Message
        env:
          PR_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_USER_LOGIN: ${{ github.event.pull_request.user.login }}
          PR_USER_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          payload=$(jq -n \
            --arg action "$PR_ACTION" \
            --arg number "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg head "$PR_HEAD_REF" \
            --arg base "$PR_BASE_REF" \
            --arg url "$PR_URL" \
            --arg user "$PR_USER_LOGIN" \
            --arg avatar "$PR_USER_AVATAR" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: ("Pull Request " + $action + ": #" + $number),
                description: ("**" + $title + "**\n\nBranch: `" + $head + "` into `" + $base + "`"),
                url: $url,
                color: 5814783,
                author: { name: $user, icon_url: $avatar },
                footer: { text: $repo }
              }]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$payload" \
               "$DISCORD_WEBHOOK_URL"
