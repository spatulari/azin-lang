name: FreeBSD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          mem: 4096
          prepare: pkg install -y cmake git
          run: |
            cmake -B build
            cmake --build build -j $(nproc)
            output=$(./build/apps/azc/azc --version 2>&1)
            echo "$output"
            echo "$output" | grep -qi "azc 0.1.0"
