name: macOS

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: |
          output=$(./build/apps/azc/azc --version 2>&1)
          echo "$output"
          echo "$output" | grep -qi "azc 0.1.0"
