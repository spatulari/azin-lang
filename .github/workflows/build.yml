name: CI

on:
    push:
        branches: [ main, dev ]
    pull_request:
        branches: [ main, dev ]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        name: Go (${{ matrix.os }})
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]

        defaults:
            run:
                shell: bash

        steps:
            - uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                go-version: 'stable'
                cache: true

            - name: Install modern GCC (Linux)
              if: runner.os == 'Linux'
              run: |
                sudo apt-get update -qq
                sudo apt-get install -y -qq software-properties-common
                sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
                sudo apt-get install -y -qq gcc-14
                sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100

            - name: Verify formatting
              if: runner.os != 'Windows'
              run: |
                test -z "$(gofmt -l .)"

            - name: Run go vet
              run: go vet ./...

            - name: Run tests
              run: go test -count=1 -short ./tests/...

            - name: Build
              run: go build -o azc ./cmd/azc

            - name: Full test suite with coverage (Unix)
              if: runner.os != 'Windows'
              run: go test -count=1 -cover ./tests/...

            - name: Full test suite with coverage (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: go test -count=1 -cover ./tests/...


