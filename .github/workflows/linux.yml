name: Linux

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 22 (apt.llvm.org)
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=clang-22 \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DAZIN_ENABLE_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build build

      - name: Test
        run: |
          output=$(./build/cli/azin version 2>&1)
          echo "$output"
          echo "$output" | grep -qi "azin 0.0.1"
